version: '3.8'
name: chancery

services:
  postgres:
    image: postgres:16
    container_name: chancery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - chancery

  app:
    container_name: chancery-app
    restart: unless-stopped
    build:
      context: php
    volumes:
      - ./app:/var/www/app
    depends_on:
      - postgres
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PHP_IDE_CONFIG: 'serverName=app'
    networks:
      - chancery

  reverb:
    container_name: chancery-reverb
    restart: unless-stopped
    build:
      context: php
    volumes:
      - ./app:/var/www/app
    working_dir: /var/www/app
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    depends_on:
      - app
      - redis
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      BROADCAST_DRIVER: reverb
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 6001
      REVERB_HOST: host.docker.internal
      REVERB_PORT: 6001
      REVERB_SCHEME: http
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "yourpassword"
    ports:
      - "6001:6001"
    networks:
      - chancery

  nginx:
    container_name: chancery-nginx
    restart: unless-stopped
    image: nginx:stable-alpine
    ports:
      - '8080:80'
    volumes:
      - ./app:/var/www/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - postgres
    networks:
      - chancery

  redis:
    image: redis:latest
    container_name: chancery-redis
    ports:
      - "63880:6379"
    volumes:
      - ./redisData:/data
    command: ["redis-server", "--requirepass", "yourpassword"]
    networks:
      - chancery

  mailpit:
    image: axllent/mailpit:latest
    container_name: chancery-mail
    environment:
      MP_LABEL: user-teamly-local
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - chancery

  queue:
    container_name: chancery-queue
    restart: unless-stopped
    build:
      context: php
    working_dir: /var/www/app
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./app:/var/www/app
    depends_on:
      - app
      - redis
    networks:
      - chancery

volumes:
  postgres:

networks:
  chancery:
    driver: bridge
