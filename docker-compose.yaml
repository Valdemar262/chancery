version: '3.8'
name: chancery

services:
  postgres:
    image: postgres:16
    container_name: chancery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - chancery

  app:
    container_name: chancery-App
    restart: unless-stopped
    build:
      context: php
    volumes:
      - ./App:/var/www/App
    depends_on:
      - postgres
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PHP_IDE_CONFIG: 'serverName=App'
    networks:
      - chancery

  reverb:
    container_name: chancery-reverb
    restart: unless-stopped
    build:
      context: php
    volumes:
      - ./App:/var/www/App
    working_dir: /var/www/App
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    depends_on:
      - app
      - redis
    environment:
      # Чтобы Reverb видел те же переменные, что и приложение
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      BROADCAST_DRIVER: reverb
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 6001
      REVERB_HOST: host.docker.internal
      REVERB_PORT: 6001
      REVERB_SCHEME: http
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6001:6001"
    networks:
      - chancery

  nginx:
    container_name: chancery-nginx
    restart: unless-stopped
    image: nginx:stable-alpine
    ports:
      - '8080:80'
    volumes:
      - ./App:/var/www/App
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - postgres
    networks:
      - chancery

  redis:
    image: redis:latest
    container_name: chancery-redis
    ports:
      - "63880:6379"
    volumes:
      - ./redisData:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - chancery

  mailpit:
    image: axllent/mailpit:latest
    container_name: chancery-mail
    environment:
      MP_LABEL: user-teamly-local
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - chancery

volumes:
  postgres:

networks:
  chancery:
    driver: bridge
